services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CLIENT_URL: http://localhost:4173

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: http://localhost:3000
    ports:
      - "4173:4173"
    depends_on:
      - server
